apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: korext-oss-registry
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: registry.acme.internal
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: korext-oss-registry
            port:
              number: 80
